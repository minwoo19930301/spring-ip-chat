spring.application.name=spring-ip-chat

server.forward-headers-strategy=none
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/chatdb;AUTO_SERVER=TRUE;MODE=PostgreSQL}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

chat.retention-days=${CHAT_RETENTION_DAYS:30}
chat.retention.cleanup-interval-ms=${CHAT_RETENTION_CLEANUP_INTERVAL_MS:3600000}
chat.retention.cleanup-initial-delay-ms=${CHAT_RETENTION_CLEANUP_INITIAL_DELAY_MS:60000}
chat.redis.enabled=${CHAT_REDIS_ENABLED:false}
chat.redis.flush-interval-ms=${CHAT_REDIS_FLUSH_INTERVAL_MS:5000}
chat.redis.flush-initial-delay-ms=${CHAT_REDIS_FLUSH_INITIAL_DELAY_MS:5000}
chat.redis.flush-batch-size=${CHAT_REDIS_FLUSH_BATCH_SIZE:100}

management.server.port=${MANAGEMENT_PORT:8081}
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}
management.info.env.enabled=true

info.app.name=${spring.application.name}
info.app.description=IP-based public WebSocket chat room with Redis buffering and durable message storage
info.app.websocket-endpoint=/ws-chat
info.app.history-endpoint=/api/messages
info.app.storage.primary-buffer=redis
info.app.storage.durable-store=${DURABLE_STORE:database}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
